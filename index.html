<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Seba Gym" />
  <title>Seba Gym Tracker</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header>
      <span class="header-logo">Seba</span>
    </header>

    <!-- Views -->
    <main>

      <section id="home" class="view">
        <h1 class="view-title">Home</h1>
        <div class="placeholder-card">
          <span class="placeholder-icon">🏋️</span>
          <h3>Start Routine</h3>
          <p>Coming soon</p>
        </div>
      </section>

      <section id="routines" class="view">

        <!-- List subview -->
        <div id="rt-list-view">
          <div class="rt-list-header">
            <h1 class="view-title" style="margin-bottom:0">Routines</h1>
            <button id="rt-new-btn" class="rt-new-btn">+ New Routine</button>
          </div>
          <div id="rt-list"></div>
        </div>

        <!-- Detail subview -->
        <div id="rt-detail-view" style="display:none">
          <div class="rt-topbar">
            <button id="rt-back-btn" class="rt-back-btn" aria-label="Back">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 5l-7 7 7 7"/>
              </svg>
            </button>
            <input id="rt-name-input" class="rt-name-input" type="text" placeholder="Routine name" autocomplete="off" />
            <button id="rt-save-btn" class="rt-save-btn">Save</button>
          </div>
          <div id="rt-exercises"></div>
          <div class="rt-add-ex-wrap">
            <button id="rt-add-exercise-btn" class="rt-add-ex-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="18" height="18">
                <path d="M12 5v14M5 12h14"/>
              </svg>
              Add Exercise
            </button>
          </div>
        </div>

      </section>

      <section id="progress" class="view">
        <h1 class="view-title">Progress</h1>
        <div class="placeholder-card">
          <span class="placeholder-icon">📈</span>
          <h3>Progress</h3>
          <p>Coming soon</p>
        </div>
      </section>

      <section id="exercises" class="view">
        <h1 class="view-title">Exercises</h1>

        <!-- Search -->
        <div class="ex-search-wrap">
          <svg class="ex-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
          <input id="ex-search" class="ex-search" type="search" placeholder="Search exercises…" autocomplete="off" />
        </div>

        <!-- Filter chips -->
        <div class="ex-chips">
          <button class="ex-chip active" data-filter="All">All</button>
          <button class="ex-chip" data-filter="Core">Core</button>
          <button class="ex-chip" data-filter="Upper">Upper</button>
          <button class="ex-chip" data-filter="Lower">Lower</button>
        </div>

        <!-- Exercise list -->
        <div id="ex-list" class="ex-list"></div>
      </section>

    </main>

    <!-- Bottom nav -->
    <nav>
      <button class="nav-btn" data-view="home" aria-label="Home">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
          <path d="M9 21V12h6v9"/>
        </svg>
        <span>Home</span>
      </button>

      <button class="nav-btn" data-view="routines" aria-label="Routines">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <path d="M16 2v4M8 2v4M3 10h18"/>
        </svg>
        <span>Routines</span>
      </button>

      <button class="nav-btn" data-view="progress" aria-label="Progress">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        <span>Progress</span>
      </button>

      <button class="nav-btn" data-view="exercises" aria-label="Exercises">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6.5 6.5h11M6.5 17.5h11M3 10h2.5v4H3zM18.5 10H21v4h-2.5z"/>
          <rect x="5.5" y="8.5" width="13" height="7" rx="1"/>
        </svg>
        <span>Exercises</span>
      </button>
    </nav>

    <!-- Routine: exercise picker sheet -->
    <div id="rt-picker-sheet" class="ex-sheet" role="dialog" aria-modal="true">
      <div class="ex-sheet-header">
        <h2 class="ex-sheet-title">Add Exercise</h2>
        <button id="rt-picker-close" class="ex-sheet-close" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="rt-picker-body">
        <div class="ex-search-wrap">
          <svg class="ex-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
          <input id="rt-picker-search" class="ex-search" type="search" placeholder="Search exercises…" autocomplete="off" />
        </div>
        <div class="ex-chips" id="rt-picker-chips">
          <button class="ex-chip active" data-filter="All">All</button>
          <button class="ex-chip" data-filter="Core">Core</button>
          <button class="ex-chip" data-filter="Upper">Upper</button>
          <button class="ex-chip" data-filter="Lower">Lower</button>
        </div>
        <div id="rt-picker-list" class="rt-picker-list"></div>
      </div>
    </div>

    <!-- Routine: new routine name dialog -->
    <div id="rt-name-dialog" class="rt-dialog-overlay" style="display:none">
      <div class="rt-dialog">
        <h3 class="rt-dialog-title">New Routine</h3>
        <input id="rt-dialog-input" class="ex-input" type="text" placeholder="e.g. Push Day" autocomplete="off" />
        <div class="rt-dialog-actions">
          <button id="rt-dialog-cancel" class="rt-dialog-btn rt-dialog-cancel">Cancel</button>
          <button id="rt-dialog-confirm" class="rt-dialog-btn rt-dialog-confirm">Create</button>
        </div>
      </div>
    </div>

    <!-- Overlay (shared by sheet + modal) -->
    <div id="ex-overlay" class="ex-overlay"></div>

    <!-- Exercise detail bottom sheet -->
    <div id="ex-detail-sheet" class="ex-sheet" role="dialog" aria-modal="true">
      <div class="ex-sheet-header">
        <h2 id="ex-detail-name" class="ex-sheet-title"></h2>
        <button id="ex-detail-close" class="ex-sheet-close" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="ex-sheet-body">
        <div class="ex-detail-row"><span class="ex-detail-label">Zone</span><span id="ex-detail-zone" class="ex-detail-value"></span></div>
        <div class="ex-detail-row"><span class="ex-detail-label">Muscles</span><span id="ex-detail-muscle" class="ex-detail-value"></span></div>
        <div class="ex-detail-row"><span class="ex-detail-label">Equipment</span><span id="ex-detail-equipment" class="ex-detail-value"></span></div>
        <div class="ex-detail-row"><span class="ex-detail-label">Notes</span><span id="ex-detail-notes" class="ex-detail-value ex-detail-notes"></span></div>
      </div>
      <button id="ex-detail-delete" class="ex-delete-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
        </svg>
        Delete Exercise
      </button>
    </div>

    <!-- New exercise modal -->
    <div id="ex-new-modal" class="ex-sheet" role="dialog" aria-modal="true">
      <div class="ex-sheet-header">
        <h2 class="ex-sheet-title">New Exercise</h2>
        <button id="ex-new-close" class="ex-sheet-close" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <form id="ex-new-form" class="ex-form">
        <label class="ex-form-label">
          Name <span class="ex-required">*</span>
          <input name="exName" class="ex-input" type="text" placeholder="e.g. Bulgarian Split Squat" required autocomplete="off" />
        </label>
        <label class="ex-form-label">
          Zone <span class="ex-required">*</span>
          <select name="exZone" class="ex-input ex-select" required>
            <option value="">Select zone…</option>
            <option value="Core">Core</option>
            <option value="Upper">Upper</option>
            <option value="Lower">Lower</option>
          </select>
        </label>
        <label class="ex-form-label">
          Muscle Group <span class="ex-required">*</span>
          <input name="exMuscle" class="ex-input" type="text" placeholder="e.g. Glutes, Hamstrings" required autocomplete="off" />
        </label>
        <label class="ex-form-label">
          Equipment <span class="ex-required">*</span>
          <select name="exEquipment" class="ex-input ex-select" required>
            <option value="">Select equipment…</option>
            <option>Barbell</option>
            <option>Dumbbell</option>
            <option>Machine</option>
            <option>Kettlebell</option>
            <option>Cable</option>
            <option>Bodyweight</option>
            <option>Band</option>
          </select>
        </label>
        <label class="ex-form-label">
          Notes
          <textarea name="exNotes" class="ex-input ex-textarea" placeholder="Optional notes…" rows="3"></textarea>
        </label>
        <button type="submit" class="ex-save-btn">Save Exercise</button>
      </form>
    </div>

  </div>

  <button id="ex-fab" class="ex-fab" aria-label="New exercise">+ New Exercise</button>

  <script type="module" src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/gym-logger/sw.js');
      });
    }
  </script>
</body>
</html>
